<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GroceryScan — AI Grocery Item Detection</title>
  <meta name="description" content="Real-time AI-powered grocery item detection using your webcam." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/style.css" />
</head>
<body>
  <!-- Background animated blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
            <path d="M2 12h20"/>
          </svg>
        </div>
        <h1>Grocery<span>Scan</span></h1>
      </div>
      <div class="header-status" id="connection-status">
        <span class="status-dot"></span>
        <span class="status-text">Connecting...</span>
      </div>
    </header>

    <!-- Main content -->
    <main class="main-content">
      <!-- Camera section -->
      <section class="camera-section">
        <div class="camera-card">
          <div class="camera-header">
            <h2>📷 Live Camera Feed</h2>
            <div class="camera-controls">
              <button id="btn-start" class="btn btn-primary" onclick="startDetection()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Start
              </button>
              <button id="btn-stop" class="btn btn-danger" onclick="stopDetection()" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                Stop
              </button>
            </div>
          </div>
          <div class="camera-viewport" id="camera-viewport">
            <video id="video" autoplay playsinline webkit-playsinline muted></video>
            <canvas id="overlay-canvas"></canvas>
            <div class="camera-placeholder" id="camera-placeholder">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <p>Click <strong>Start</strong> to begin detection</p>
              <p class="sub">Allow camera access when prompted</p>
            </div>
          </div>
          <div class="stats-bar">
            <div class="stat">
              <span class="stat-label">FPS</span>
              <span class="stat-value" id="fps-display">—</span>
            </div>
            <div class="stat">
              <span class="stat-label">Items Found</span>
              <span class="stat-value" id="item-count">0</span>
            </div>
            <div class="stat">
              <span class="stat-label">Latency</span>
              <span class="stat-value" id="latency-display">—</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Detection results panel -->
      <aside class="results-panel">
        <div class="results-card">
          <div class="results-header">
            <h2>🛒 Detected Items</h2>
            <span class="badge" id="total-badge">0</span>
          </div>
          <div class="results-list" id="results-list">
            <div class="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 0 1-8 0"/>
              </svg>
              <p>No items detected yet</p>
              <p class="sub">Start the camera and hold grocery items in front</p>
            </div>
          </div>
        </div>

        <!-- Detection history -->
        <div class="history-card">
          <div class="results-header">
            <h2>📊 Detection Log</h2>
            <button class="btn btn-ghost" onclick="clearHistory()">Clear</button>
          </div>
          <div class="history-list" id="history-list">
            <div class="empty-state small">
              <p>Detection events will appear here</p>
            </div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <!-- Hidden canvas for frame capture -->
  <canvas id="capture-canvas" style="display:none;"></canvas>

  <script src="src/js/app.js"></script>
</body>
</html>
